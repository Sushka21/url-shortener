services:
  urlshortener:
    image: urlshortener
    hostname: urlshortener
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8080"
      STORAGE_TYPE: "postgres"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "urlshortener"
      POSTGRES_USER: "urlshortener_user"
      POSTGRES_PASSWORD: "12345"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080" 
    restart: unless-stopped

  postgres:
    image: postgres:17
    restart: always
    command: ["postgres", "-c", "log_statement=all"]
    environment:
      POSTGRES_DB: "urlshortener"
      POSTGRES_USER: "urlshortener_user"
      POSTGRES_PASSWORD: "12345"
      POSTGRES_PORT: "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U urlshortener_user -d urlshortener" ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres-data: